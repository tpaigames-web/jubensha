<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<title>剧本杀小馆</title>
<link rel="stylesheet" href="app.css">
</head>
<body>
<div id="banner" class="banner warn" style="display:none"></div>
<div id="dm-pop" class="dm-pop" style="display:none">
  <div class="dm-pop-inner">
    <div class="dm-pop-title">📣 主持人</div>
    <div class="dm-pop-text" id="dm-pop-text"></div>
    <div class="row" style="margin-top:10px">
      <button class="btn ghost grow" id="dm-skip">⏭ 跳过朗读</button>
      <button class="btn primary grow" id="dm-ok">知道了</button>
    </div>
  </div>
</div>
<div id="toast" class="toast" style="display:none"></div>
<div id="drag-ghost"></div>

<div class="wrap">

  <!-- ========== 第一步：身份 ========== -->
  <section id="v-login" style="display:none">
    <div style="text-align:center;padding:26px 0 18px">
      <div style="font-size:3em">🕵️</div>
      <h1>剧本杀小馆</h1>
      <p class="hint">无主持人 · 程序当 DM</p>
    </div>
    <div class="card">
      <h2>你是谁</h2>
      <p class="hint" style="margin-bottom:10px">PIN 用来在换设备、清缓存后找回你的席位，记住它</p>
      <div style="margin-bottom:10px"><input id="in-name" maxlength="12" placeholder="你的昵称"></div>
      <div style="margin-bottom:12px"><input id="in-pin" inputmode="numeric" maxlength="4" placeholder="设置4位PIN"></div>
      <button id="btn-login" class="btn primary wide">下一步</button>
    </div>
  </section>

  <!-- ========== 第二步：选本 / 加入房间 ========== -->
  <section id="v-room" style="display:none">
    <div class="row" style="padding:14px 0 8px">
      <button class="icon-btn" id="btn-back-login">‹</button>
      <div class="grow"><b id="who-label">—</b><div class="hint">开新局，或加入朋友的房间</div></div>
    </div>
    <div class="card">
      <h2>🎭 开一局新的</h2>
      <p class="hint" style="margin-bottom:10px">选一个剧本，系统会分配房号给你发给朋友</p>
      <div id="script-list"><p class="hint">加载剧本中…</p></div>
    </div>
    <div class="card">
      <h2>🚪 加入朋友的房间</h2>
      <div class="row">
        <input id="in-room" class="grow" inputmode="numeric" maxlength="4" placeholder="输入4位房号">
        <button id="btn-join" class="btn primary" style="flex:none">加入</button>
      </div>
      <p class="hint" style="margin-top:8px">⚠️ 只能加入<b>已经有人</b>的房间。想决定玩哪个剧本，请用上面的「开一局新的」。</p>
    </div>
  </section>

  <!-- ========== 大厅 ========== -->
  <section id="v-lobby" style="display:none">
    <div class="row" style="padding:12px 0 4px">
      <div class="grow"><b id="lobby-title">等待开局</b><div class="hint" id="lobby-script">—</div></div>
      <button class="icon-btn" id="btn-lobby-exit" title="离开房间">🚪</button>
    </div>
    <div class="card" style="text-align:center">
      <div class="hint">房号</div>
      <div style="font-size:2.2em;font-weight:800;letter-spacing:8px;color:#d9b45b" id="lobby-room">----</div>
      <div id="lobby-count" class="hint"></div>
    </div>
    <div class="card">
      <h2>🔗 你的专属链接</h2>
      <p class="hint" style="margin-bottom:8px">换设备、微信被杀后台后，打开这个链接就能回到你的席位。建议现在就发给自己。</p>
      <div class="link-box" id="my-link">—</div>
      <button id="btn-copy" class="btn ghost wide" style="margin-top:8px">📋 复制我的专属链接</button>
    </div>
    <div class="card">
      <h2>👥 席位</h2>
      <div id="lobby-seats"></div>
    </div>
    <div class="card">
      <h2>🎭 选择角色</h2>
      <p class="hint" style="margin-bottom:8px">全员选定后自动开始，无需房主</p>
      <div id="lobby-chars"></div>
      <button id="btn-random" class="btn ghost wide">🎲 随机分配给我</button>
    </div>
  </section>

  <!-- ========== 对局 ========== -->
  <section id="v-game" style="display:none">
    <div class="topbar">
      <span class="badge-phase" id="g-phase">—</span>
      <span class="timer grow" id="g-timer"></span>
      <button class="icon-btn" id="btn-font" title="字号">A</button>
      <button class="icon-btn" id="btn-sound" title="声音">🔊</button>
      <button class="icon-btn" id="btn-exit" title="离开房间">🚪</button>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="script">📖 剧本</button>
      <button class="tab" data-tab="clue">🔍 线索<span class="n" id="n-clue" style="display:none"></span></button>
      <button class="tab" data-tab="act">🎬 行动<span class="n" id="n-act" style="display:none"></span></button>
      <button class="tab" data-tab="chat">💬 讨论<span class="n" id="n-chat" style="display:none"></span></button>
      <button class="tab" data-tab="dm">📣 播报<span class="n" id="n-dm" style="display:none"></span></button>
    </div>

    <div id="p-script" class="panel active"></div>
    <div id="p-clue" class="panel"></div>
    <div id="p-act" class="panel"></div>
    <div id="p-chat" class="panel"></div>
    <div id="p-dm" class="panel"></div>

    <div class="actionbar" id="actionbar"></div>
  </section>

</div>
<script src="app.js"></script>
</body>
</html>
